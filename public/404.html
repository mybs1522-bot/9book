<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
        // Simple SPA redirect for static hosting
        // If the user visits a nested route directly, redirect to index.html
        // and let the app router handle it.
        var path = window.location.pathname;
        window.location.replace('/index.html?redirect=' + encodeURIComponent(path));
    </script>
</head>

<body>
</body>

</html>
